# =============================================================================
# Node Beta — Headless Auth Build & Deploy
# AUR-9: Continuous Evolution Loop — Phase 2 + 3
# Repository: aurora-swarm-core-node-beta (dedicated Node Beta repo)
#
# Phase 2: Builds Docker image with entrypoint.sh hydration script and
#           pushes to GitHub Container Registry (GHCR).
# Phase 3: Fires ClawCloud Run redeployment webhook.
#
# Authentication: ChatGPT Plus OAuth via OPENCLAW_SESSION_JSON env secret
# IMPORTANT: OPENCLAW_SESSION_JSON must ALSO be set in ClawCloud Run app
#            environment variables — entrypoint.sh reads it at boot.
# =============================================================================
name: "Node Beta — Headless Auth Build & Deploy"

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  workflow_dispatch:
    inputs:
      force_deploy:
        description: 'Force deploy even if no code changes'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-deploy:
    name: Build Docker Image & Deploy to ClawCloud
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Node Beta code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Verify entrypoint.sh is present
        run: |
          if [ ! -f "entrypoint.sh" ]; then
            echo "::error::entrypoint.sh not found in repository root!"
            exit 1
          fi
          echo "entrypoint.sh present: $(wc -l < entrypoint.sh) lines"

      - name: Build and push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify OPENCLAW_SESSION_JSON secret is configured
        env:
          SESSION_JSON: ${{ secrets.OPENCLAW_SESSION_JSON }}
        run: |
          if [ -z "$SESSION_JSON" ]; then
            echo "::error::OPENCLAW_SESSION_JSON secret is not configured!"
            echo "::error::Add it at: github.com/${{ github.repository }} -> Settings -> Secrets -> Actions"
            exit 1
          fi
          CHAR_COUNT=$(echo "$SESSION_JSON" | wc -c | tr -d ' ')
          echo "OPENCLAW_SESSION_JSON: PRESENT (${CHAR_COUNT} chars)"
          echo "This secret must ALSO be set as env var in ClawCloud Run app settings."

      - name: Trigger ClawCloud Run redeployment
        env:
          DEPLOY_WEBHOOK: ${{ secrets.CLAWCLOUD_DEPLOY_WEBHOOK_URL }}
          IMAGE_TAG: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
        run: |
          if [ -n "$DEPLOY_WEBHOOK" ]; then
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST "$DEPLOY_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"image\": \"${IMAGE_TAG}\"}")
            if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
              echo "ClawCloud redeployment webhook fired. HTTP ${HTTP_STATUS}"
            else
              echo "::warning::ClawCloud webhook returned HTTP ${HTTP_STATUS}. Manual redeploy may be required."
            fi
          else
            echo "CLAWCLOUD_DEPLOY_WEBHOOK_URL not configured. Manual redeployment required."
            echo "New image: $IMAGE_TAG"
          fi

      - name: Deployment summary
        run: |
          echo "## Node Beta — Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "| Image | \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Auth | ChatGPT Plus OAuth (OPENCLAW_SESSION_JSON) |" >> $GITHUB_STEP_SUMMARY
          echo "| Cost | Zero fiat (ChatGPT Plus subscription reuse) |" >> $GITHUB_STEP_SUMMARY