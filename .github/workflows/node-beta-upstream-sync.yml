# =============================================================================
# Node Beta — Upstream Sync Sentinel (Dockerfile pin edition)
# AUR-28: Hotfix — tracks pinned version in Dockerfile RUN npm install -g line
#
# Watches for new releases of the `openclaw` npm package and automatically
# opens a PR bumping the pinned version in the Dockerfile when a newer
# version is available.
# =============================================================================
name: "Node Beta — Upstream Sync Sentinel"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Pin to specific version (e.g. 2026.3.13), leave empty for latest'
        required: false
        default: ''
        type: string

jobs:
  check-upstream:
    name: Check openclaw npm upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Node Beta main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity (aurora-swarm-bot)
        run: |
          git config user.name "aurora-swarm-bot"
          git config user.email "aurora-swarm-bot@aurora-swarm-ai.internal"

      - name: Detect current pinned and latest openclaw version
        id: versions
        run: |
          # Extract pinned version from: RUN npm install -g openclaw@<version>
          CURRENT=$(grep -oP 'npm install -g openclaw@\K[^\s"]+' Dockerfile || echo "")
          echo "Current pinned version: ${CURRENT}"

          TARGET="${{ inputs.target_version }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(npm view openclaw version 2>/dev/null || echo "")
          fi
          echo "Latest version: ${TARGET}"

          if [ -z "$CURRENT" ]; then
            echo "::error::Could not detect pinned openclaw version in Dockerfile."
            exit 1
          fi

          if [ -z "$TARGET" ]; then
            echo "::warning::Could not determine latest openclaw version."
            echo "UPGRADE_NEEDED=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "CURRENT_VERSION=${CURRENT}" >> $GITHUB_ENV
          echo "TARGET_VERSION=${TARGET}" >> $GITHUB_ENV

          if [ "$CURRENT" = "$TARGET" ]; then
            echo "Dockerfile pin is up-to-date (${CURRENT}). No upgrade needed."
            echo "UPGRADE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "Upgrade available: ${CURRENT} -> ${TARGET}"
            echo "UPGRADE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Bump openclaw pin in Dockerfile
        if: env.UPGRADE_NEEDED == 'true'
        run: |
          sed -i "s|npm install -g openclaw@${{ env.CURRENT_VERSION }}|npm install -g openclaw@${{ env.TARGET_VERSION }}|g" Dockerfile

      - name: Create upgrade branch and open PR
        if: env.UPGRADE_NEEDED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-openclaw-${{ env.TARGET_VERSION }}"
          git checkout -b "${BRANCH}"
          git add Dockerfile
          git commit -m "chore(deps): bump openclaw ${{ env.CURRENT_VERSION }} -> ${{ env.TARGET_VERSION }} [skip ci]"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore(deps): bump openclaw to v${{ env.TARGET_VERSION }}" \
            --body "## Upstream Sync — openclaw upgrade

          Auto-generated by the Upstream Sync Sentinel.

          | Field | Value |
          |---|---|
          | Before | \`${{ env.CURRENT_VERSION }}\` |
          | After | \`${{ env.TARGET_VERSION }}\` |
          | Artifact | \`Dockerfile\` |

          **Review checklist before merging:**
          - [ ] Check openclaw changelog for breaking changes
          - [ ] Verify entrypoint.sh session path still correct
          - [ ] Rebuild and smoke-test Docker image locally" \
            --base main \
            --head "${BRANCH}"

      - name: Sync report
        run: |
          cat >> $GITHUB_STEP_SUMMARY << 'EOF'
          ## Upstream Sync Report

          | Field | Value |
          |---|---|
          | Package | openclaw |
          | Current | ${{ env.CURRENT_VERSION }} |
          | Latest | ${{ env.TARGET_VERSION }} |
          | Upgrade Needed | ${{ env.UPGRADE_NEEDED }} |
          EOF