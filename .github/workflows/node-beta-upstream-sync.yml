# =============================================================================
# Node Beta — Upstream Sync Sentinel (npm edition)
# AUR-27: Core Engine Pivot — Migrate from agw to original openclaw
#
# Watches for new releases of the `openclaw` npm package
# (the engine that powers Node Beta) and automatically opens
# a PR bumping `package.json` when a newer version is available.
# =============================================================================
name: "Node Beta — Upstream Sync Sentinel"

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      target_version:
        description: 'Pin to specific version (e.g. 3.11.0), leave empty for latest'
        required: false
        default: ''

jobs:
  check-upstream:
    name: Check openclaw npm upstream
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout Node Beta main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git identity (aurora-swarm-bot)
        run: |
          git config user.name "aurora-swarm-bot"
          git config user.email "aurora-swarm-bot@aurora-swarm-ai.internal"

      - name: Detect current and latest openclaw version
        id: versions
        run: |
          CURRENT=$(node -p "require('./package.json').dependencies['openclaw'] || require('./package.json').devDependencies['openclaw']" 2>/dev/null | tr -d '"^~><=')
          echo "Current version: ${CURRENT}"

          TARGET="${{ github.event.inputs.target_version }}"
          if [ -z "$TARGET" ]; then
            TARGET=$(npm view openclaw version 2>/dev/null || echo "")
          fi
          echo "Target version: ${TARGET}"

          if [ -z "$TARGET" ]; then
            echo "::warning::Could not determine latest openclaw version."
            echo "UPGRADE_NEEDED=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "CURRENT_VERSION=${CURRENT}" >> $GITHUB_ENV
          echo "TARGET_VERSION=${TARGET}" >> $GITHUB_ENV

          if [ "$CURRENT" = "$TARGET" ]; then
            echo "Package is up-to-date (${CURRENT}). No upgrade needed."
            echo "UPGRADE_NEEDED=false" >> $GITHUB_ENV
          else
            echo "Upgrade available: ${CURRENT} -> ${TARGET}"
            echo "UPGRADE_NEEDED=true" >> $GITHUB_ENV
          fi

      - name: Bump openclaw in package.json
        if: env.UPGRADE_NEEDED == 'true'
        run: |
          npm pkg set dependencies.openclaw="^${{ env.TARGET_VERSION }}"

      - name: Create upgrade branch and open PR
        if: env.UPGRADE_NEEDED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="chore/bump-openclaw-${{ env.TARGET_VERSION }}"
          git checkout -b "${BRANCH}"
          git add package.json
          git commit -m "chore(deps): bump openclaw ${{ env.CURRENT_VERSION }} -> ${{ env.TARGET_VERSION }} [skip ci]"
          git push origin "${BRANCH}"
          gh pr create \
            --title "chore(deps): bump openclaw to v${{ env.TARGET_VERSION }}" \
            --body "## Upstream Sync — openclaw upgrade

| | Version |
|---|---|
| **Before** | \`${{ env.CURRENT_VERSION }}\` |
| **After** | \`${{ env.TARGET_VERSION }}\` |

Auto-generated by the Upstream Sync Sentinel (AUR-27).

**Review checklist before merging:**
- [ ] Check openclaw changelog for breaking changes
- [ ] Verify entrypoint.sh session path still points to correct location
- [ ] Rebuild and test Docker image locally" \
            --base main \
            --head "${BRANCH}"

      - name: Sync report
        run: |
          echo "## Upstream Sync Report (npm)" >> $GITHUB_STEP_SUMMARY
          echo "| Package | openclaw |" >> $GITHUB_STEP_SUMMARY
          echo "| Current | ${{ env.CURRENT_VERSION || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Latest | ${{ env.TARGET_VERSION || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Upgrade Needed | ${{ env.UPGRADE_NEEDED }} |" >> $GITHUB_STEP_SUMMARY